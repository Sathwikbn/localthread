<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          if (registrations.length > 0) {
            var promises = [];
            for (var i = 0; i < registrations.length; i++) {
              promises.push(registrations[i].unregister());
            }
            Promise.all(promises).then(function() {
              console.log('Stale Service Workers unregistered.');
              if (!sessionStorage.getItem('sw_cleared_reload')) {
                sessionStorage.setItem('sw_cleared_reload', '1');
                window.location.reload();
              }
            });
          }
        });
      }
    </script>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FAF9F6" />
    <meta
      name="description"
      content="LocalThread — Discover local clothing shops near you. Browse boutiques, ethnic wear, and fashion from independent stores within 10km."
    />
    <!-- Google Fonts: Warm Minimalist Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>LocalThread — Shop Local, Dress Local</title>
  </head>

    <div id="root"></div>
  </body>
</html>
